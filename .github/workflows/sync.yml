name: Sync scores

# Pings the app's /api/sync endpoint as a BACKSTOP so results update even when
# nobody has the page open. The fast live-refresh during matches comes from the
# page itself (it nudges /api/sync ~every 60s while open; the server throttles
# real API calls to ~90s). This cron just catches finals when no one's watching.
#
# NOTE: GitHub Actions cron has a 5-minute MINIMUM and is best-effort (runs can
# be delayed or dropped under load) — so */5 is as fast as it gets here, and it
# won't actually fire every 1-2 min even if you ask. For rock-solid sub-minute
# pings, point https://cron-job.org at the same force URL instead.
#
# RATE LIMIT: */5 ≈ 288 calls/day from this cron; viewer-driven syncs add at
# most ~960/day (one per 90s throttle window). Fine for any paid API-Football
# plan. If you're back on the free 100/day tier, raise this to */20.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger sync
        env:
          # Optional: only needed if you set SYNC_SECRET in Vercel. Add the same
          # value as a GitHub repo secret named SYNC_SECRET.
          SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
        run: |
          curl -fsS "https://world-cup-leaderboard.vercel.app/api/sync?force=1&key=${SYNC_SECRET}" \
            -H "x-sync-secret: ${SYNC_SECRET}" || true
